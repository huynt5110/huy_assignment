version: '3.8'

services:
  postgres-leads:
    image: postgres:15-alpine
    container_name: postgres-leads
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: leads_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_leads_data:/var/lib/postgresql/data

  postgres-activities:
    image: postgres:15-alpine
    container_name: postgres-activities
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: activities_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_activities_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"

volumes:
  postgres_leads_data:
  postgres_activities_data:
